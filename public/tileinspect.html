<!DOCTYPE html>
<html>
<head>
<title>Roguelike Spritesheet tile viewer</title>
<style>
  body { background:#111; color:#eee; font-family:monospace; padding:20px; }
  canvas { border: 1px solid #444; }
  #info { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding:10px; border-radius:8px; font-size:13px; }
  h2 { color:#0f0; margin-top:0;}
</style>
</head>
<body>
<div id="info">
  <h2>🗺 Tile Inspector</h2>
  <p>Hover over the sheet to see tile coords.</p>
  <div id="coords">...</div>
</div>
<p style="color:#aaa">Roguelike/RPG Pack spritesheet · 16px tiles · 1px gap · stride=17 · <span id="dims"></span></p>
<canvas id="c"></canvas>
<script>
const img = new Image();
img.src = '/tiles/roguelike.png';
img.onload = () => {
  const canvas = document.getElementById('c');
  const cols = Math.floor((img.width + 1) / 17);
  const rows = Math.floor((img.height + 1) / 17);
  document.getElementById('dims').textContent = img.width + 'x' + img.height + 'px  →  ' + cols + ' cols × ' + rows + ' rows';
  const SCALE = 3;
  canvas.width  = img.width  * SCALE;
  canvas.height = img.height * SCALE;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, 0, 0, img.width * SCALE, img.height * SCALE);

  // Draw grid
  ctx.strokeStyle = 'rgba(255,0,0,0.2)';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= cols; c++) { ctx.beginPath(); ctx.moveTo(c*17*SCALE, 0); ctx.lineTo(c*17*SCALE, canvas.height); ctx.stroke(); }
  for (let r = 0; r <= rows; r++) { ctx.beginPath(); ctx.moveTo(0, r*17*SCALE); ctx.lineTo(canvas.width, r*17*SCALE); ctx.stroke(); }

  canvas.addEventListener('mousemove', e => {
    const rect  = canvas.getBoundingClientRect();
    const px = (e.clientX - rect.left) / (canvas.width  / rect.width);
    const py = (e.clientY - rect.top)  / (canvas.height / rect.height);
    const col = Math.floor(px / (17 * SCALE));
    const row = Math.floor(py / (17 * SCALE));
    document.getElementById('coords').innerHTML = `Col: <b>${col}</b>  Row: <b>${row}</b><br>T(${col}, ${row})<br>sx=${col*17} sy=${row*17}`;

    // highlight
    const ctx2 = canvas.getContext('2d');
    ctx2.clearRect(0, 0, canvas.width, canvas.height);
    ctx2.imageSmoothingEnabled = false;
    ctx2.drawImage(img, 0, 0, img.width * SCALE, img.height * SCALE);
    ctx2.strokeStyle = 'rgba(255,0,0,0.2)';
    ctx2.lineWidth = 0.5;
    for (let c2 = 0; c2 <= cols; c2++) { ctx2.beginPath(); ctx2.moveTo(c2*17*SCALE, 0); ctx2.lineTo(c2*17*SCALE, canvas.height); ctx2.stroke(); }
    for (let r2 = 0; r2 <= rows; r2++) { ctx2.beginPath(); ctx2.moveTo(0, r2*17*SCALE); ctx2.lineTo(canvas.width, r2*17*SCALE); ctx2.stroke(); }
    // highlight hovered cell
    ctx2.strokeStyle = '#ff0';
    ctx2.lineWidth = 2;
    ctx2.strokeRect(col*17*SCALE, row*17*SCALE, 17*SCALE, 17*SCALE);
    ctx2.fillStyle = 'rgba(255,255,0,0.15)';
    ctx2.fillRect(col*17*SCALE, row*17*SCALE, 17*SCALE, 17*SCALE);
  });
};
</script>
</body>
</html>
